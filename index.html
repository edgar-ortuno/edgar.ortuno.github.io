<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edgar Ortuño</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: manipulation;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 80px 20px 60px; /* Ajuste: más espacio arriba para bajar contenido */
            background: #000000;
            color: #e0e0e0;
            text-align: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }
        /* Modo claro */
        body.modo-dia {
            background: #ffffff;
            color: #111111;
        }
        body.modo-dia p {
            color: #444444;
        }

        /* Botón de menú con efecto vidrio líquido */
        .boton-menu {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 1.5rem;
            padding: 8px 12px;
            cursor: pointer;
            z-index: 1000;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        body.modo-dia .boton-menu {
            background: rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.15);
            color: #000;
        }
        .boton-menu:hover {
            transform: scale(1.05);
        }

        /* Botón de cambio de tema */
        .boton-tema {
            position: fixed;
            top: 15px;
            right: 15px;
            background: #ffffff;
            color: #000000;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        body.modo-dia .boton-tema {
            background: #000000;
            color: #ffffff;
        }
        .boton-tema:hover {
            transform: scale(1.1);
        }

        /* Menú lateral */
        .menu-lateral {
            position: fixed;
            left: -150px;
            top: 0;
            height: 100vh;
            width: 150px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 70px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            z-index: 999;
            transition: left 0.3s ease;
        }
        body.modo-dia .menu-lateral {
            background: rgba(0, 0, 0, 0.06);
            border-right: 1px solid rgba(0, 0, 0, 0.1);
        }
        .menu-lateral.activo {
            left: 0;
        }
        .menu-lateral a {
            display: block;
            color: inherit;
            padding: 12px 18px;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .menu-lateral a:hover {
            background: rgba(255, 255, 255, 0.08);
            padding-left: 22px;
        }
        body.modo-dia .menu-lateral a:hover {
            background: rgba(0, 0, 0, 0.08);
        }

        /* Enlace en la palabra Edgar */
        .enlace-edgar {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .enlace-edgar:hover {
            color: #8B4513; /* Color café */
            text-decoration: underline;
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 12px;
            margin-top: 20px; /* Baja un poco el título */
            letter-spacing: 2px;
        }
        p {
            font-size: 1.2rem;
            font-weight: 300;
            color: #aaaaaa;
            max-width: 600px;
            margin: 0 auto 45px; /* Menos espacio antes de los botones */
            transition: color 0.4s ease;
        }

        /* Contenedor de redes: bajado ligeramente */
        .social-buttons {
            position: absolute;
            top: calc(50% + 40px); /* Bajado un poco más del centro */
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
            max-width: 300px;
        }

        /* Botones con más curvas y colores vibrantes */
        .btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 32px;
            border-radius: 28px;
            text-decoration: none;
            font-size: 1.15rem;
            font-weight: 500;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            will-change: transform;
            cursor: grab;
            user-select: none;
        }
        .btn:active {
            cursor: grabbing;
        }
        .btn:hover {
            transform: translateY(-5px);
        }

        /* Animación de caída: ahora bajan más */
        .btn.cayendo {
            position: absolute;
            animation: caerDesorden 1.2s ease forwards;
        }
        @keyframes caerDesorden {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
            100% { 
                transform: translateY(calc(var(--desvioY, 0px) + 60px)) translateX(var(--desvioX, 0px)) rotate(var(--rotacion, 0deg)); 
                opacity: 0.95; 
            }
        }

        /* Animación de regreso */
        .btn.regresando {
            animation: volver 0.8s ease forwards !important;
        }
        @keyframes volver {
            0% { transform: translateY(var(--desvioY, 0px)) translateX(var(--desvioX, 0px)) rotate(var(--rotacion, 0deg)); opacity: 0.95; }
            100% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
        }

        /* Colores mucho más vibrantes */
        .btn-facebook { background: #1877F2; color: white; }
        .btn-instagram { background: linear-gradient(135deg, #FF6C5C, #FF2E63, #A855F7); color: white; }
        .btn-tiktok { background: #FFFFFF; color: #000000; border: 2px solid #000000; }
        .btn-x { background: #000000; color: #ffffff; border: 1px solid #333; }
        body.modo-dia .btn-x { background: #ffffff; color: #000000; border: 1px solid #ddd; }
        .btn-whatsapp { background: #25D366; color: white; }

        .btn i {
            font-size: 1.6rem;
        }

        /* Estilo de corazones cayendo */
        .corazon-cafe {
            position: fixed;
            font-size: 1.5rem;
            color: #8B4513;
            pointer-events: none;
            animation: lluvia 3s ease-in forwards;
            z-index: 500;
        }
        @keyframes lluvia {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Texto "edgr." */
        .marca {
            position: fixed;
            bottom: 12px;
            right: 20px;
            font-size: 0.85rem;
            color: #333;
            font-weight: 300;
            text-decoration: none;
            transition: color 0.4s ease;
            z-index: 1;
        }
        body.modo-dia .marca {
            color: #aaa;
        }
    </style>
</head>
<body>
    <!-- Botón de menú -->
    <button class="boton-menu" onclick="alternarMenu(event)">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Botón de cambio de tema sol/luna -->
    <button class="boton-tema" onclick="cambiarTema()">
        <i class="fas fa-moon" id="icono-tema"></i>
    </button>

    <!-- Menú lateral con nueva opción -->
    <div class="menu-lateral" id="miMenu" onclick="event.stopPropagation()">
        <a href="https://youtu.be/CIOq0qkZjcU?si=TS7SsueL4xG5JSD7" target="_blank">Más Información. :)</a>
        <a href="#" onclick="lloverCorazones(event)">Ortuño :(</a>
    </div>

    <h1><a href="https://youtu.be/eBba35M_9nM?si=8aHOJTVng8Iyjicu" target="_blank" class="enlace-edgar">Edgar</a> Ortuño</h1>
    <p>Bienvenid@ a mi página personal ✨</p>

    <div class="social-buttons" id="contenedor-redes">
        <a href="https://www.facebook.com/share/1D9C18NVvc/" target="_blank" class="btn btn-facebook">
            <i class="fab fa-facebook-f"></i> Facebook
        </a>
        
        <a href="https://www.instagram.com/edgar_ortuno" target="_blank" class="btn btn-instagram">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        
        <a href="https://www.tiktok.com/@edgar_ortuno" target="_blank" class="btn btn-tiktok">
            <i class="fab fa-tiktok"></i> TikTok
        </a>

        <a href="https://x.com/edgar_ortuno_" target="_blank" class="btn btn-x">
            <i class="fa-brands fa-x-twitter"></i> X
        </a>
        
        <a href="https://wa.me/59171274987" target="_blank" class="btn btn-whatsapp">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
    </div>

    <a href="https://youtu.be/XjA7tvuqXG4?si=sW4pXYvZqhJa7T8Z" target="_blank" class="marca">edgr.</a>

    <script>
        const menu = document.getElementById('miMenu');
        const iconoTema = document.getElementById('icono-tema');
        const contenedor = document.getElementById('contenedor-redes');
        let contadorToques = 0;
        let contadorVolver = 0;
        let temporizador;
        let efectoActivo = false;
        const botones = document.querySelectorAll('.btn');
        let elementoArrastrado = null;
        let offsetX, offsetY;

        // Cambiar entre sol y luna
        function cambiarTema() {
            document.body.classList.toggle('modo-dia');
            const esDia = document.body.classList.contains('modo-dia');
            iconoTema.className = esDia ? 'fas fa-sun' : 'fas fa-moon';
        }

        // Abrir/cerrar menú
        function alternarMenu(event) {
            event.stopPropagation();
            menu.classList.toggle('activo');
        }

        // Cerrar menú al tocar fuera
        document.addEventListener('click', function() {
            if (menu.classList.contains('activo')) {
                menu.classList.remove('activo');
            }
        });

        // Función lluvia de corazones cafés
        function lloverCorazones(event) {
            event.preventDefault();
            event.stopPropagation();
            menu.classList.remove('activo');
            
            const cantidad = 30;
            for (let i = 0; i < cantidad; i++) {
                setTimeout(() => {
                    const corazon = document.createElement('div');
                    corazon.className = 'corazon-cafe';
                    corazon.innerHTML = '🤎';
                    corazon.style.left = Math.random() * 100 + 'vw';
                    corazon.style.animationDuration = (2 + Math.random() * 2) + 's';
                    document.body.appendChild(corazon);
                    
                    setTimeout(() => corazon.remove(), 5000);
                }, i * 50);
            }
        }

        // Funciones para arrastrar iconos
        function iniciarArrastre(e) {
            if (!efectoActivo) return;
            elementoArrastrado = this;
            const toque = e.touches ? e.touches[0] : e;
            const rect = elementoArrastrado.getBoundingClientRect();
            offsetX = toque.clientX - rect.left;
            offsetY = toque.clientY - rect.top;
            elementoArrastrado.style.zIndex = '100';
            e.preventDefault();
        }

        function moverArrastre(e) {
            if (!elementoArrastrado) return;
            const toque = e.touches ? e.touches[0] : e;
            const x = toque.clientX - offsetX - contenedor.getBoundingClientRect().left;
            const y = toque.clientY - offsetY - contenedor.getBoundingClientRect().top;
            elementoArrastrado.style.transform = `translate(${x}px, ${y}px) rotate(var(--rotacion, 0deg))`;
            e.preventDefault();
        }

        function terminarArrastre() {
            if (elementoArrastrado) {
                elementoArrastrado.style.zIndex = '';
                elementoArrastrado = null;
            }
        }

        // Asignar eventos de arrastre
        botones.forEach(boton => {
            boton.addEventListener('mousedown', iniciarArrastre);
            boton.addEventListener('touchstart', iniciarArrastre);
        });
        document.addEventListener('mousemove', moverArrastre);
        document.addEventListener('touchmove', moverArrastre);
        document.addEventListener('mouseup', terminarArrastre);
        document.addEventListener('touchend', terminarArrastre);

        // Contar toques: 3 para caer, 2 para volver
        document.addEventListener('click', function(e) {
            if (e.target.closest('.btn') || e.target.closest('.boton-menu') || e.target.closest('.boton-tema') || e.target.closest('.menu-lateral') || e.target.closest('.enlace-edgar')) return;
            
            contadorToques++;
            contadorVolver++;
            clearTimeout(temporizador);
            
            temporizador = setTimeout(() => {
                contadorToques = 0;
                contadorVolver = 0;
            }, 1000);

            // 3 toques: caer
            if (contadorToques === 3 && !efectoActivo) {
                efectoActivo = true;
                contadorToques = 0;
                contadorVolver = 0;
                
                botones.forEach((boton, indice) => {
                    const desvioX = (Math.random() - 0.5) * 220;
                    const desvioY = (Math.random() - 0.5) * 120;
                    const rotacion = (Math.random() - 0.5) * 45;
                    
                    boton.style.setProperty('--desvioX', desvioX + 'px');
                    boton.style.setProperty('--desvioY', desvioY + 'px');
                    boton.style.setProperty('--rotacion', rotacion + 'deg');
                    boton.classList.remove('regresando');
                    
                    setTimeout(() => {
                        boton.classList.add('cayendo');
                    }, indice * 80);
                });
            }

            // 2 toques: volver
            if (contadorVolver === 2 && efectoActivo) {
                efectoActivo = false;
                contadorToques = 0;
                contadorVolver = 0;
                
                botones.forEach((boton, indice) => {
                    boton.classList.remove('cayendo');
                    setTimeout(() => {
                        boton.classList.add('regresando');
                    }, indice * 60);
                    setTimeout(() => {
                        boton.style.transform = '';
                    }, 800);
                });
            }
        });
    </script>
</body>
</html>
