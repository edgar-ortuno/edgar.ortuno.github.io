
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edgar Ortuño</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 60px 20px;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            color: #e0e0e0;
            text-align: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top, rgba(26,26,26,0.4) 0%, rgba(5,5,5,0.6) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* Botón de menú con efecto vidrio líquido */
        .boton-menu {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 1.5rem;
            padding: 8px 12px;
            cursor: pointer;
            z-index: 1000;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .boton-menu:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.05);
        }

        /* Menú lateral con efecto vidrio líquido */
        .menu-lateral {
            position: fixed;
            left: -150px;
            top: 0;
            height: 100vh;
            width: 150px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 70px;
            transition: left 0.3s ease;
            z-index: 999;
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.2);
        }
        .menu-lateral.activo {
            left: 0;
        }
        .menu-lateral a {
            display: block;
            color: #e0e0e0;
            padding: 12px 18px;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .menu-lateral a:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            padding-left: 22px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.2rem;
            font-weight: 300;
            color: #aaaaaa;
            max-width: 600px;
            margin: 0 auto 50px;
        }

        /* Contenedor de redes */
        .social-buttons {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            position: relative;
            min-height: 400px;
        }

        /* Botones y animación de caída */
        .btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 260px;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.15rem;
            font-weight: 400;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            will-change: transform;
        }
        .btn:hover {
            transform: translateY(-5px);
        }

        /* Animación de caída desordenada DENTRO de la pantalla */
        .btn.cayendo {
            position: absolute;
            animation: caerDesorden 1.5s ease forwards;
        }
        @keyframes caerDesorden {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
            100% { 
                transform: translateY(calc(150px + var(--desvioY) * 1px)) translateX(calc(var(--desvioX) * 1px)) rotate(var(--rotacion)); 
                opacity: 0.9; 
            }
        }

        /* Colores de los botones */
        .btn-facebook { background: #1877f2; color: white; }
        .btn-instagram { background: linear-gradient(135deg, #f56040, #c13584, #833ab4); color: white; }
        .btn-tiktok { background: #ffffff; color: #000000; border: 1px solid #000000; }
        .btn-x { background: #000000; color: #ffffff; border: 1px solid #333; }
        .btn-whatsapp { background: #25d366; color: white; }

        .btn i {
            font-size: 1.6rem;
        }

        /* Texto "edgr." */
        .marca {
            position: fixed;
            bottom: 12px;
            right: 20px;
            font-size: 0.85rem;
            color: #333;
            font-weight: 300;
            text-decoration: none;
            transition: color 0.3s;
            z-index: 1;
        }
        .marca:hover {
            color: #555;
        }
    </style>
</head>
<body>
    <!-- Botón de menú -->
    <button class="boton-menu" onclick="alternarMenu(event)">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Menú lateral -->
    <div class="menu-lateral" id="miMenu" onclick="event.stopPropagation()">
        <a href="https://youtu.be/CIOq0qkZjcU?si=TS7SsueL4xG5JSD7" target="_blank">Más Información. :)</a>
    </div>

    <h1>Edgar Ortuño</h1>
    <p>Bienvenid@ a mi página personal ✨</p>

    <div class="social-buttons" id="contenedor-redes">
        <a href="https://www.facebook.com/share/1D9C18NVvc/" target="_blank" class="btn btn-facebook">
            <i class="fab fa-facebook-f"></i> Facebook
        </a>
        
        <a href="https://www.instagram.com/edgar_ortuno" target="_blank" class="btn btn-instagram">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        
        <a href="https://www.tiktok.com/@edgar_ortuno" target="_blank" class="btn btn-tiktok">
            <i class="fab fa-tiktok"></i> TikTok
        </a>

        <a href="https://x.com/edgar_ortuno_" target="_blank" class="btn btn-x">
            <i class="fa-brands fa-x-twitter"></i> X
        </a>
        
        <a href="https://wa.me/59171274987" target="_blank" class="btn btn-whatsapp">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
    </div>

    <a href="https://youtu.be/XjA7tvuqXG4?si=sW4pXYvZqhJa7T8Z" target="_blank" class="marca">edgr.</a>

    <script>
        const menu = document.getElementById('miMenu');
        let contadorToques = 0;
        let temporizador;
        let efectoActivo = false;
        const botones = document.querySelectorAll('.btn');

        // Abrir/cerrar menú
        function alternarMenu(event) {
            event.stopPropagation();
            menu.classList.toggle('activo');
        }

        // Cerrar menú al tocar fuera
        document.addEventListener('click', function() {
            if (menu.classList.contains('activo')) {
                menu.classList.remove('activo');
            }
        });

        // Contar 5 toques y activar caída
        document.addEventListener('click', function() {
            contadorToques++;
            clearTimeout(temporizador);
            
            temporizador = setTimeout(() => {
                contadorToques = 0;
            }, 1000);

            if (contadorToques === 5 && !efectoActivo) {
                efectoActivo = true;
                contadorToques = 0;
                
                botones.forEach((boton, indice) => {
                    // Valores aleatorios para desordenar y voltear
                    const desvioX = (Math.random() - 0.5) * 180;
                    const desvioY = Math.random() * 80;
                    const rotacion = (Math.random() - 0.5) * 40;
                    
                    boton.style.setProperty('--desvioX', desvioX);
                    boton.style.setProperty('--desvioY', desvioY);
                    boton.style.setProperty('--rotacion', rotacion + 'deg');
                    
                    setTimeout(() => {
                        boton.classList.add('cayendo');
                    }, indice * 100);
                });
            }
        });

        // Movimiento con el giroscopio/acelerómetro del celular
        if (window.DeviceMotionEvent) {
            window.addEventListener('devicemotion', function(event) {
                if (!efectoActivo) return;
                
                const giroX = event.beta || 0;  // Inclinación arriba/abajo
                const giroY = event.gamma || 0; // Inclinación izquierda/derecha
                
                botones.forEach((boton, indice) => {
                    const velocidad = 0.8 + (indice * 0.1);
                    const moverX = giroY * velocidad;
                    const moverY = giroX * velocidad;
                    
                    const estiloActual = boton.style.transform || '';
                    const baseX = parseFloat(boton.style.getPropertyValue('--desvioX')) || 0;
                    const baseY = parseFloat(boton.style.getPropertyValue('--desvioY')) || 0;
                    const rotacion = boton.style.getPropertyValue('--rotacion') || '0deg';
                    
                    boton.style.transform = `translateY(calc(${baseY}px + ${moverY}px)) translateX(calc(${baseX}px + ${moverX}px)) rotate(${rotacion})`;
                });
            });
        }
    </script>
</body>
</html>
