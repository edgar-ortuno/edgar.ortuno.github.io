<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edgar Ortuño</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 60px 20px;
            min-height: 100vh;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.4rem;
            max-width: 700px;
            margin: 0 auto 50px;
        }
        .social-buttons {
            margin-top: 40px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: white;
            padding: 16px 32px;
            margin: 12px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn:hover {
            transform: translateY(-6px) scale(1.08);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .btn-facebook {
            background: #1877f2;
        }
        .btn-instagram {
            background: linear-gradient(135deg, #f56040, #c13584, #833ab4, #5851db);
        }
        .btn-whatsapp {
            background: #25d366;
        }

        .btn i {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <h1>¡Hola! Soy Edgar Ortuño</h1>
    <p>Bienvenido a mi página web. Conéctate conmigo en mis redes:</p>

    <div class="social-buttons">
        <a href="https://www.facebook.com/share/1D9C18NVvc/" target="_blank" class="btn btn-facebook">
            <i class="fab fa-facebook-f"></i>
            Facebook
        </a>
        
        <a href="https://www.instagram.com/edgar_ortuno_" target="_blank" class="btn btn-instagram">
            <i class="fab fa-instagram"></i>
            Instagram
        </a>
        
        <a href="https://wa.me/59171274987" target="_blank" class="btn btn-whatsapp">
            <i class="fab fa-whatsapp"></i>
            WhatsApp
        </a>
    </div>

    <p style="margin-top: 70px; font-size: 1rem; opacity: 0.9;">
        Hecho con ❤️ usando GitHub Pages
    </p>
</body>
</html>
