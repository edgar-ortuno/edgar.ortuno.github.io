<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edgar Ortuño</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 60px 20px;
            background: #0a0a0a;
            color: #e0e0e0;
            text-align: center;
            min-height: 100vh;
            position: relative;
        }

        /* Botón de menú con 3 barras */
        .boton-menu {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #000;
            color: #fff;
            border: none;
            font-size: 1.8rem;
            padding: 10px 15px;
            cursor: pointer;
            z-index: 1000;
            border-radius: 8px;
        }

        /* Menú lateral */
        .menu-lateral {
            position: fixed;
            left: -200px; /* Oculto por defecto */
            top: 0;
            height: 100vh;
            width: 200px;
            background: #000000; /* Fondo totalmente negro */
            padding-top: 80px;
            transition: left 0.3s ease;
            z-index: 999;
        }
        .menu-lateral.activo {
            left: 0; /* Se muestra al activarse */
        }
        .menu-lateral a {
            display: block;
            color: #e0e0e0;
            padding: 18px 25px;
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.3s;
        }
        .menu-lateral a:hover {
            color: #3498db;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 300;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.3rem;
            font-weight: 300;
            color: #aaaaaa;
            max-width: 600px;
            margin: 0 auto 50px;
        }
        .social-buttons {
            margin-top: 40px;
        }
        .btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            margin: 10px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.15rem;
            font-weight: 400;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn:hover {
            transform: translateY(-5px);
        }
        .btn::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            transform: scale(0);
            transition: transform 0.6s, opacity 0.6s;
        }
        .btn:active::after {
            width: 300px;
            height: 300px;
            transform: scale(1);
            opacity: 0;
        }

        /* Colores de los botones */
        .btn-facebook { background: #1877f2; color: white; }
        .btn-instagram { background: linear-gradient(135deg, #f56040, #c13584, #833ab4); color: white; }
        .btn-tiktok { background: #ffffff; color: #000000; border: 1px solid #000000; }
        .btn-whatsapp { background: #25d366; color: white; }

        .btn i {
            font-size: 1.6rem;
        }

        /* Texto "edgr" abajo a la derecha */
        .marca {
            position: fixed;
            bottom: 20px;
            right: 30px;
            font-size: 1.2rem;
            color: #555;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <!-- Botón de menú con 3 barras -->
    <button class="boton-menu" onclick="alternarMenu()">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Menú lateral -->
    <div class="menu-lateral" id="miMenu">
        <a href="#">Más información</a>
    </div>

    <h1>Edgar Ortuño</h1>
    <p>Bienvenido a mi página personal ✨</p>

    <div class="social-buttons">
        <a href="https://www.facebook.com/share/1D9C18NVvc/" target="_blank" class="btn btn-facebook">
            <i class="fab fa-facebook-f"></i> Facebook
        </a>
        
        <a href="https://www.instagram.com/edgar_ortuno" target="_blank" class="btn btn-instagram">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        
        <a href="https://www.tiktok.com/@edgar_ortuno" target="_blank" class="btn btn-tiktok">
            <i class="fab fa-tiktok"></i> TikTok
        </a>
        
        <a href="https://wa.me/59171274987" target="_blank" class="btn btn-whatsapp">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
    </div>

    <!-- Texto abajo a la derecha -->
    <div class="marca">edgr</div>

    <!-- Código para abrir y cerrar el menú -->
    <script>
        function alternarMenu() {
            const menu = document.getElementById('miMenu');
            menu.classList.toggle('activo');
        }
    </script>
</body>
</html>
