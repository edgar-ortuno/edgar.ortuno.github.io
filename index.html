<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edgar Ortuño</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 60px 20px;
            background: #0a0a0a;
            color: #e0e0e0;
            text-align: center;
            min-height: 100vh;
        }
        h1 {
            font-size: 3.2rem;
            font-weight: 300;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.3rem;
            font-weight: 300;
            color: #aaaaaa;
            max-width: 600px;
            margin: 0 auto 50px;
        }
        .social-buttons {
            margin-top: 40px;
        }
        .btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: white;
            padding: 16px 32px;
            margin: 10px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.15rem;
            font-weight: 400;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn:hover {
            transform: translateY(-5px);
        }

        /* Efecto de onda al hacer clic */
        .btn::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            transform: scale(0);
            transition: transform 0.6s, opacity 0.6s;
        }
        .btn:active::after {
            width: 300px;
            height: 300px;
            transform: scale(1);
            opacity: 0;
        }

        /* Colores oficiales de cada red */
        .btn-facebook { background: #1877f2; }
        .btn-instagram { background: linear-gradient(135deg, #f56040, #c13584, #833ab4); }
        .btn-tiktok { background: #000000; border: 1px solid #ff0050; }
        .btn-whatsapp { background: #25d366; }

        .btn i {
            font-size: 1.6rem;
        }
    </style>
</head>
<body>
    <h1>Edgar Ortuño</h1>
    <p>Bienvenido a mi página personal ✨</p>

    <div class="social-buttons">
        <a href="https://www.facebook.com/share/1D9C18NVvc/" target="_blank" class="btn btn-facebook">
            <i class="fab fa-facebook-f"></i> Facebook
        </a>
        
        <a href="https://www.instagram.com/edgar_ortuno" target="_blank" class="btn btn-instagram">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        
        <a href="https://www.tiktok.com/@edgar_ortuno" target="_blank" class="btn btn-tiktok">
            <i class="fab fa-tiktok"></i> TikTok
        </a>
        
        <a href="https://wa.me/59171274987" target="_blank" class="btn btn-whatsapp">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
    </div>
</body>
</html>
