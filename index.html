<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edgar Ortuño</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: manipulation;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 0;
            background: #000000;
            color: #ffffff;
            text-align: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }
        body.modo-dia {
            background: #ffffff;
            color: #000000;
        }

        .boton-menu {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 1.5rem;
            padding: 8px 12px;
            cursor: pointer;
            z-index: 1000;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        body.modo-dia .boton-menu {
            background: rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.15);
            color: #000;
        }
        .boton-menu:hover {
            transform: scale(1.05);
        }

        .boton-tema {
            position: fixed;
            top: 15px;
            right: 15px;
            background: #ffffff;
            color: #000000;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.4s ease;
        }
        body.modo-dia .boton-tema {
            background: #000000;
            color: #ffffff;
        }
        .boton-tema:hover {
            transform: scale(1.1);
        }

        .menu-lateral {
            position: fixed;
            left: -150px;
            top: 0;
            height: 100vh;
            width: 150px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 70px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            z-index: 999;
            transition: left 0.3s ease;
        }
        body.modo-dia .menu-lateral {
            background: rgba(0, 0, 0, 0.06);
            border-right: 1px solid rgba(0, 0, 0, 0.1);
        }
        .menu-lateral.activo {
            left: 0;
        }
        .menu-lateral a {
            display: block;
            color: inherit;
            padding: 12px 18px;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .menu-lateral a:hover {
            background: rgba(255, 255, 255, 0.08);
            padding-left: 22px;
        }

        /* Texto de bienvenida: más delgado y más pequeño */
        .bienvenida {
            position: fixed;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            font-weight: 100; /* Más delgado */
            opacity: 0.6;
            z-index: 50;
        }

        /* Título: más grande y más grueso */
        h1 {
            font-size: 3.8rem; /* Más grande */
            font-weight: 700; /* Más grueso */
            margin: 50px 0 20px;
            letter-spacing: 1px;
            padding: 0 15px;
        }

        /* Botones más abajo del centro */
        .social-buttons {
            position: fixed;
            top: calc(50% + 120px); /* Bajados más */
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
            max-width: 300px;
            z-index: 10;
        }

        .btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 32px;
            border-radius: 28px;
            text-decoration: none;
            font-size: 1.15rem;
            font-weight: 400;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            user-select: none;
        }
        .btn:hover {
            transform: translateY(-5px);
        }

        .btn i {
            font-family: 'Font Awesome 6 Free', 'Font Awesome 6 Brands', sans-serif !important;
            font-size: 1.6rem;
            font-weight: 900;
            font-style: normal;
        }

        .btn-facebook { background: #1877F2; color: white; }
        .btn-instagram { background: linear-gradient(135deg, #FF6C5C, #FF2E63, #A855F7); color: white; }
        .btn-tiktok { background: #FFFFFF; color: #000000; border: 2px solid #000000; }
        .btn-x { background: #000000; color: #ffffff; border: 1px solid #333; }
        body.modo-dia .btn-x { background: #ffffff; color: #000000; border: 1px solid #ddd; }
        .btn-whatsapp { background: #25D366; color: white; }

        .elemento-lluvia {
            position: fixed;
            pointer-events: none;
            animation: lluvia 3s ease-in forwards;
            z-index: 500;
            top: 15px;
        }
        .texto-2004 {
            font-size: 2rem;
            font-weight: 300;
            color: #ffffff;
        }
        body.modo-dia .texto-2004 {
            color: #111;
        }
        .corazon-cafe {
            font-size: 1.5rem;
            color: #8B4513;
        }

        @keyframes lluvia {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .marca {
            position: fixed;
            bottom: 12px;
            right: 20px;
            font-size: 0.85rem;
            color: #cccccc;
            font-weight: 300;
            text-decoration: none;
            transition: color 0.4s ease;
            z-index: 1;
        }
        body.modo-dia .marca {
            color: #555;
        }
    </style>
</head>
<body>
    <p class="bienvenida">Bienvenid@ a : Página..</p>

    <button class="boton-menu" onclick="alternarMenu(event)">
        <i class="fas fa-bars"></i>
    </button>

    <button class="boton-tema" onclick="cambiarTema()">
        <i class="fas fa-moon" id="icono-tema"></i>
    </button>

    <div class="menu-lateral" id="miMenu" onclick="event.stopPropagation()">
        <a href="https://youtu.be/CIOq0qkZjcU?si=TS7SsueL4xG5JSD7" target="_blank">Más Información. :)</a>
        <a href="#" onclick="lloverCorazones(event)">Ortuño :(</a>
        <a href="#" onclick="mostrarAcercaDe(event)">Acerca De</a>
    </div>

    <h1>ESTAMOS CONFIGURANDO...</h1>

    <div class="social-buttons" id="contenedor-redes">
        <a href="https://www.facebook.com/share/1D9C18NVvc/" target="_blank" class="btn btn-facebook">
            <i class="fab fa-facebook-f"></i> Facebook
        </a>
        
        <a href="https://www.instagram.com/edgar_ortuno" target="_blank" class="btn btn-instagram">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        
        <a href="https://www.tiktok.com/@edgar_ortuno" target="_blank" class="btn btn-tiktok">
            <i class="fab fa-tiktok"></i> TikTok
        </a>

        <a href="https://x.com/edgar_ortuno_" target="_blank" class="btn btn-x">
            <i class="fa-brands fa-x-twitter"></i> X
        </a>
        
        <a href="https://wa.me/59171274987" target="_blank" class="btn btn-whatsapp">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
    </div>

    <a href="https://youtu.be/XjA7tvuqXG4?si=sW4pXYvZqhJa7T8Z" target="_blank" class="marca">edgr.</a>

    <script>
        const menu = document.getElementById('miMenu');
        const iconoTema = document.getElementById('icono-tema');
        let contadorToquesVacio = 0;
        let temporizadorVacio;

        function cambiarTema() {
            document.body.classList.toggle('modo-dia');
            const esDia = document.body.classList.contains('modo-dia');
            iconoTema.className = esDia ? 'fas fa-sun' : 'fas fa-moon';
        }

        function alternarMenu(event) {
            event.stopPropagation();
            menu.classList.toggle('activo');
        }

        document.addEventListener('click', function() {
            if (menu.classList.contains('activo')) {
                menu.classList.remove('activo');
            }
        });

        function mostrarAcercaDe(event) {
            event.preventDefault();
            event.stopPropagation();
            menu.classList.remove('activo');
            alert('Xd');
        }

        function lloverCorazones(event) {
            event.preventDefault();
            event.stopPropagation();
            menu.classList.remove('activo');
            crearLluvia('corazon-cafe', '🤎', 30);
        }

        document.addEventListener('click', function(e) {
            if (e.target.closest('.btn') || e.target.closest('.boton-menu') || e.target.closest('.boton-tema') || e.target.closest('.menu-lateral') || e.target.closest('.bienvenida')) return;
            
            contadorToquesVacio++;
            clearTimeout(temporizadorVacio);
            
            temporizadorVacio = setTimeout(() => {
                contadorToquesVacio = 0;
            }, 1000);

            if (contadorToquesVacio === 2) {
                contadorToquesVacio = 0;
                crearLluvia('texto-2004', '2004', 30);
            }
        });

        function crearLluvia(clase, contenido, cantidad) {
            for (let i = 0; i < cantidad; i++) {
                setTimeout(() => {
                    const elemento = document.createElement('div');
                    elemento.className = `elemento-lluvia ${clase}`;
                    elemento.innerHTML = contenido;
                    elemento.style.left = Math.random() * 100 + 'vw';
                    elemento.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                    document.body.appendChild(elemento);
                    
                    setTimeout(() => elemento.remove(), 5000);
                }, i * 50);
            }
        }
    </script>
</body>
</html>
